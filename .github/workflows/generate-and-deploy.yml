name: Auto-Generate Vocab Config & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. Run the vocabulary config generator
      - name: Generate vocabulary configuration
        run: node generate-vocab-config.js

      # 4. Commit changes if vocabularies.json and vocabularies.js were modified (only on main branch)
      - name: Commit updated vocabulary data
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/vocabularies.json data/vocabularies.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-generate vocabularies" && git push)

      # 5. Upload Pages artifact
      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # 6. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/deploy-pages@v5
